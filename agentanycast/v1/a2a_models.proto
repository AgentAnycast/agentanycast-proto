syntax = "proto3";

package agentanycast.v1;

option go_package = "github.com/agentanycast/agentanycast-proto/gen/go/agentanycast/v1;agentanycastv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "agentanycast/v1/streaming.proto";

// ─────────────────────────────────────────────────────────────
// Task — the fundamental unit of work in the A2A protocol.
// ─────────────────────────────────────────────────────────────

message Task {
  string task_id = 1;
  string context_id = 2;
  TaskStatus status = 3;
  repeated Message messages = 4;
  repeated Artifact artifacts = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  // Optional: the skill this task is targeting.
  string target_skill_id = 8;
  // The peer that originated this task.
  string originator_peer_id = 9;
}

// TaskStatus represents the A2A task lifecycle states.
enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_SUBMITTED = 1;
  TASK_STATUS_WORKING = 2;
  TASK_STATUS_INPUT_REQUIRED = 3;
  TASK_STATUS_COMPLETED = 4;
  TASK_STATUS_FAILED = 5;
  TASK_STATUS_CANCELED = 6;
  TASK_STATUS_REJECTED = 7;
}

// ─────────────────────────────────────────────────────────────
// Message — a communication turn between agents.
// ─────────────────────────────────────────────────────────────

message Message {
  string message_id = 1;
  MessageRole role = 2;
  repeated Part parts = 3;
  google.protobuf.Timestamp created_at = 4;
}

enum MessageRole {
  MESSAGE_ROLE_UNSPECIFIED = 0;
  MESSAGE_ROLE_USER = 1;
  MESSAGE_ROLE_AGENT = 2;
}

// ─────────────────────────────────────────────────────────────
// Part — the smallest content unit in a message or artifact.
// ─────────────────────────────────────────────────────────────

message Part {
  oneof content {
    TextPart text_part = 1;
    DataPart data_part = 2;
    UrlPart url_part = 3;
    RawPart raw_part = 4;
  }
  string media_type = 10;
  map<string, string> metadata = 11;
}

message TextPart {
  string text = 1;
}

message DataPart {
  google.protobuf.Struct data = 1;
}

message UrlPart {
  string url = 1;
  string filename = 2;
}

message RawPart {
  bytes data = 1;
  string filename = 2;
}

// ─────────────────────────────────────────────────────────────
// Artifact — a concrete output generated by an agent.
// ─────────────────────────────────────────────────────────────

message Artifact {
  string artifact_id = 1;
  string name = 2;
  repeated Part parts = 3;
}

// ─────────────────────────────────────────────────────────────
// A2AEnvelope — the wire format for A2A messages over libp2p.
// ─────────────────────────────────────────────────────────────

message A2AEnvelope {
  string envelope_id = 1;
  EnvelopeType type = 2;
  google.protobuf.Timestamp timestamp = 3;

  oneof payload {
    SendTaskPayload send_task = 10;
    TaskStatusUpdatePayload task_status_update = 11;
    TaskCompletePayload task_complete = 12;
    TaskFailPayload task_fail = 13;
    TaskCancelPayload task_cancel = 14;
    GetTaskPayload get_task = 15;
    GetTaskResponsePayload get_task_response = 16;
    AckPayload ack = 17;
    // Streaming payloads (v0.2)
    StreamStart stream_start = 18;
    StreamChunk stream_chunk = 19;
    StreamEnd stream_end = 20;
  }

  // W3C Trace Context for distributed tracing (v0.7).
  // See https://www.w3.org/TR/trace-context/
  string trace_parent = 30;
  string trace_state = 31;
}

enum EnvelopeType {
  ENVELOPE_TYPE_UNSPECIFIED = 0;
  ENVELOPE_TYPE_SEND_TASK = 1;
  ENVELOPE_TYPE_TASK_STATUS_UPDATE = 2;
  ENVELOPE_TYPE_TASK_COMPLETE = 3;
  ENVELOPE_TYPE_TASK_FAIL = 4;
  ENVELOPE_TYPE_TASK_CANCEL = 5;
  ENVELOPE_TYPE_GET_TASK = 6;
  ENVELOPE_TYPE_GET_TASK_RESPONSE = 7;
  ENVELOPE_TYPE_ACK = 8;
  // Streaming types (v0.2)
  ENVELOPE_TYPE_STREAM_START = 9;
  ENVELOPE_TYPE_STREAM_CHUNK = 10;
  ENVELOPE_TYPE_STREAM_END = 11;
}

// ── Envelope Payloads ────────────────────────────────────────

message SendTaskPayload {
  string task_id = 1;
  string context_id = 2;
  Message message = 3;
  string target_skill_id = 4;
}

message TaskStatusUpdatePayload {
  string task_id = 1;
  TaskStatus status = 2;
  Message message = 3; // optional accompanying message
}

message TaskCompletePayload {
  string task_id = 1;
  repeated Artifact artifacts = 2;
  Message message = 3;
}

message TaskFailPayload {
  string task_id = 1;
  string error_message = 2;
  Message message = 3;
}

message TaskCancelPayload {
  string task_id = 1;
}

message GetTaskPayload {
  string task_id = 1;
}

message GetTaskResponsePayload {
  Task task = 1;
}

message AckPayload {
  string acknowledged_envelope_id = 1;
}
